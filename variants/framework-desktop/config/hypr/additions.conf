# Variant: framework-desktop additions
# Appended to ~/.config/hypr/hyprland.conf by install.sh

# AGS bar startup
exec-once = ~/.config/hypr/scripts/startup.sh

# Wallpaper switching
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-switch.sh

# AGS bar spawned monitor terminals — opacity tweak
windowrulev2 = opacity 0.85 0.85,class:^(alacritty-monitor)$

# Force-close active window (repo convention; overrides any prior Super+Q binding)
bind = $mainMod, Q, exec, hyprctl dispatch killactive

# Because Super+Q is now killactive, give terminal a home on Super+Return
bind = $mainMod, Return, exec, $terminal

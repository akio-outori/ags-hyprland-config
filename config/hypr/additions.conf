# Variant: framework-desktop additions
# Appended to ~/.config/hypr/hyprland.conf by install.sh between
# `# BEGIN ags-hyprland-config:framework-desktop` and `# END ags-hyprland-config:framework-desktop`.

# AGS bar startup
exec-once = ~/.config/hypr/scripts/startup.sh

# Walker launcher: elephant is the datasource daemon, walker runs as a persistent GApplication
# service so subsequent `walker` invocations just pop the UI instantly.
exec-once = elephant
exec-once = walker --gapplication-service

# --- Strip conflicting stock binds from the base config ---
unbind = $mainMod, Q        # stock: terminal (now killactive below)
unbind = $mainMod, C        # stock: killactive (redundant with Super+Q below)
unbind = $mainMod, R        # stock: hyprlauncher (moved to Super-tap below)

# --- Repo-convention binds ---
bind  = $mainMod, Q, exec, hyprctl dispatch killactive
bind  = $mainMod, Return, exec, $terminal
bind  = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-switch.sh
bind  = $mainMod, F, fullscreen,

# Tap Super alone → open walker.
# keyd (config/keyd/default.conf -> /etc/keyd/default.conf) maps leftmeta to
# overload(meta, f12): held-with-other-key behaves as the Super modifier, a clean
# tap emits F12 which we catch here. More reliable than `bindr SUPER, SUPER_L`,
# which fired on every Super release — including after combos.
bind = , F12, exec, walker

# --- AGS bar helpers ---
windowrule {
    name = ags-alacritty-monitor-opacity
    match:class = ^(alacritty-monitor)$

    opacity = 0.85 0.85
}

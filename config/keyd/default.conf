[ids]
*

[main]
# Super (leftmeta): acts as Meta when held-with-another-key; emits F12 when tapped alone.
# Hyprland binds F12 to the walker launcher. See config/hypr/additions.conf.
#
# Install: sudo install -m 644 config/keyd/default.conf /etc/keyd/default.conf && sudo keyd reload
# Requires: pacman -S keyd; systemctl enable --now keyd
leftmeta = overload(meta, f12)
